<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фотоотчёт переговорных / AV и ВКС</title>

<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#1f2937">

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  margin: 14px;
  color: #111827;
  background: #ffffff;
}

h1 {
  font-size: 21px;
  margin: 0 0 6px;
}

h2 {
  font-size: 16px;
  margin: 20px 0 8px;
}

.subtitle {
  font-size: 13px;
  color: #4b5563;
  margin-bottom: 14px;
}

.panel,
.control-panel,
.room-panel {
  border: 1px solid #c9c9c9;
  background: #f9fafb;
  padding: 10px;
  margin-bottom: 12px;
}

.panel {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.control-panel {
  display: grid;
  grid-template-columns: 180px 220px 160px 160px 160px 1fr;
  gap: 8px;
  align-items: end;
}

.room-panel {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 10px;
  align-items: end;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 12px;
}

.field label {
  font-weight: bold;
}

input,
textarea,
select {
  font-family: Arial, sans-serif;
}

.field input,
.field select,
.photo-caption,
.photo-note-input,
.report-inline-input,
.issues-edit-textarea {
  border: 1px solid #c9c9c9;
  border-radius: 4px;
  padding: 6px;
  font-size: 12px;
}

button {
  padding: 7px 11px;
  border: 1px solid #1f2937;
  background: #1f2937;
  color: #ffffff;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}

button.secondary {
  background: #ffffff;
  color: #1f2937;
}

button.danger {
  background: #991b1b;
  border-color: #991b1b;
}

button.small {
  padding: 4px 7px;
  font-size: 11px;
}

.note {
  font-size: 11px;
  color: #4b5563;
  margin-top: 6px;
}

.report-page {
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto 16px auto;
  padding: 10mm;
  background: #ffffff;
  border: 1px solid #d1d5db;
}

.report-header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  border-bottom: 2px solid #1f2937;
  padding-bottom: 8px;
  margin-bottom: 10px;
}

.report-title {
  font-size: 18px;
  font-weight: bold;
}

.report-meta {
  font-size: 12px;
  text-align: right;
  line-height: 1.4;
}

.room-info {
  display: grid;
  grid-template-columns: 45mm 1fr;
  border: 1px solid #111827;
  margin-bottom: 10px;
  font-size: 12px;
}

.room-info div {
  padding: 6px;
  border-bottom: 1px solid #111827;
}

.room-info div:nth-child(odd) {
  background: #f3f4f6;
  font-weight: bold;
  border-right: 1px solid #111827;
}

.room-info div:nth-last-child(-n+2) {
  border-bottom: none;
}

.report-inline-input {
  width: 100%;
}

.issues-block {
  border: 1px solid #111827;
  margin-bottom: 10px;
}

.issues-title {
  background: #f3f4f6;
  font-weight: bold;
  padding: 6px;
  border-bottom: 1px solid #111827;
  font-size: 12px;
}

.issues-list {
  padding: 8px 10px;
  font-size: 12px;
  min-height: 25mm;
}

.issues-list ol {
  margin: 0;
  padding-left: 18px;
}

.issues-list li {
  margin-bottom: 4px;
}

.issues-edit-textarea {
  width: 100%;
  min-height: 120px;
  resize: vertical;
  font-family: Arial, sans-serif;
}

.photo-section-title {
  background: #f3f4f6;
  font-weight: bold;
  padding: 6px;
  border: 1px solid #111827;
  border-bottom: none;
  font-size: 12px;
}

.photo-grid {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 0;
  border-left: 1px solid #111827;
  border-top: 1px solid #111827;
}

.photo-card {
  position: relative;
  border-right: 1px solid #111827;
  border-bottom: 1px solid #111827;
  background: #ffffff;
  overflow: hidden;
}

.photo-inner {
  position: relative;
  width: 100%;
  background: #f9fafb;
}

.photo-inner img {
  display: block;
  width: 100%;
  height: auto;
}

.photo-note-overlay {
  position: absolute;
  left: 6px;
  top: 6px;
  right: 6px;
  background: rgba(255, 255, 255, 0.88);
  color: #111827;
  border: 1px solid #111827;
  border-radius: 4px;
  padding: 4px;
  font-size: 11px;
  line-height: 1.25;
  white-space: pre-wrap;
}

.photo-caption {
  width: 100%;
  min-height: 38px;
  border: none;
  border-top: 1px solid #c9c9c9;
  border-radius: 0;
  resize: vertical;
  font-size: 11px;
}

.photo-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 5px;
  border-top: 1px solid #e5e7eb;
  background: #f9fafb;
}

.photo-note-input {
  width: 100%;
  min-height: 34px;
  resize: vertical;
  font-size: 11px;
}

.hidden {
  display: none !important;
}

.print-only {
  display: none;
}

.screen-only {
  display: block;
}

@media (max-width: 1024px) {
  body {
    margin: 10px;
  }

  .panel,
  .control-panel,
  .room-panel {
    grid-template-columns: repeat(2, 1fr);
  }

  .report-page {
    width: 100%;
    min-height: auto;
    padding: 8px;
    border: 1px solid #d1d5db;
  }

  .report-header {
    grid-template-columns: 1fr;
  }

  .report-meta {
    text-align: left;
  }

  .room-info {
    grid-template-columns: 1fr;
  }

  .room-info div:nth-child(odd) {
    border-right: none;
  }
}

@media print {
  body {
    margin: 0;
    background: #ffffff;
  }

  .panel,
  .control-panel,
  .room-panel,
  .photo-controls,
  .photo-caption,
  .photo-note-input,
  .screen-only {
    display: none !important;
  }

  .print-only {
    display: block !important;
  }

  .report-page {
    width: 210mm;
    min-height: 297mm;
    margin: 0;
    padding: 10mm;
    border: none;
    page-break-after: always;
  }

  .photo-note-overlay {
    font-size: 10px;
  }

  @page {
    size: A4 portrait;
    margin: 0;
  }
}
</style>
</head>

<body>

<h1>Фотоотчёт переговорных / кабинетов под AV и ВКС</h1>
<div class="subtitle">Фотофиксация замечаний и строительной готовности переговорных</div>

<div class="panel">
  <div class="field">
    <label>Дата отчёта</label>
    <input type="date" id="reportDate">
  </div>

  <div class="field">
    <label>Город</label>
    <input id="city" placeholder="Например: Ташкент">
  </div>

  <div class="field">
    <label>Название офиса / БЦ</label>
    <input id="office" placeholder="Например: БЦ Регент">
  </div>

  <div class="field">
    <label>Этаж</label>
    <input id="floor" placeholder="Например: 4">
  </div>
</div>

<div class="control-panel screen-only">
  <div class="field">
    <label>Количество переговорных</label>
    <input type="number" id="roomCountInput" min="1" max="50" value="14">
  </div>

  <div class="field">
    <label>Выбранное помещение</label>
    <select id="roomSelect" onchange="changeRoom()"></select>
  </div>

  <button onclick="applyRoomCount()">Применить</button>
  <button class="secondary" onclick="goToChecklist()">Назад в чек-лист</button>
  <button class="secondary" onclick="window.print()">Печать / PDF</button>
  <div class="note">Фото сохраняются локально в браузере устройства.</div>
</div>

<div class="room-panel screen-only">
  <div class="field">
    <label>Размер новых фото</label>
    <select id="defaultPhotoWidth">
      <option value="100">1 фото в ряд</option>
      <option value="50" selected>2 фото в ряд</option>
      <option value="33.333">3 фото в ряд</option>
    </select>
  </div>

  <div>
    <input
      type="file"
      id="cameraInput"
      accept="image/*"
      capture="environment"
      class="hidden"
      onchange="handlePhotoCapture(event)"
    >

    <input
      type="file"
      id="galleryInput"
      accept="image/*"
      class="hidden"
      onchange="handlePhotoCapture(event)"
    >

    <button onclick="openCamera()">Сделать фото</button>
    <button class="secondary" onclick="openGallery()">Выбрать из галереи</button>
    <button class="danger" onclick="clearRoomPhotos()">Удалить фото помещения</button>
  </div>
</div>

<div id="reportContainer"></div>

<script>
const CHECKLIST_STORAGE_KEY = "av_vks_smr_checklist_final_v1";
const PHOTO_DB_NAME = "av_vks_photo_report_db";
const PHOTO_STORE_NAME = "photos";
const PHOTO_META_KEY = "av_vks_photo_report_meta_v2";

let roomCount = 14;
let activeRoom = 1;
let roomNames = {};
let checklistIssues = {};
let reportRoomMeta = {};
let db = null;

function todayISO() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function safeText(value) {
  return value === undefined || value === null ? "" : String(value);
}

function escapeHtml(value) {
  return safeText(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function roomName(roomNumber) {
  return roomNames["roomName_" + roomNumber] && roomNames["roomName_" + roomNumber].trim()
    ? roomNames["roomName_" + roomNumber].trim()
    : "Переговорная " + roomNumber;
}

function loadChecklistData() {
  try {
    const raw = localStorage.getItem(CHECKLIST_STORAGE_KEY);
    if (!raw) return;

    const data = JSON.parse(raw);

    if (data.view && data.view.roomCount) {
      roomCount = Number(data.view.roomCount) || 14;
    }

    if (data.roomNames) {
      roomNames = data.roomNames;
    }

    if (data.issues) {
      checklistIssues = data.issues;
    }

    if (data.meta) {
      document.getElementById("city").value = data.meta.city || "";
      document.getElementById("office").value = data.meta.office || "";
      document.getElementById("floor").value = data.meta.floor || "";
      document.getElementById("reportDate").value = data.meta.checkDate || todayISO();
    }
  } catch (e) {
    console.error("Ошибка чтения данных чек-листа", e);
  }
}

function loadPhotoReportMeta() {
  try {
    const raw = localStorage.getItem(PHOTO_META_KEY);
    if (!raw) return;

    const meta = JSON.parse(raw);

    if (meta.reportDate) document.getElementById("reportDate").value = meta.reportDate;
    if (meta.city) document.getElementById("city").value = meta.city;
    if (meta.office) document.getElementById("office").value = meta.office;
    if (meta.floor) document.getElementById("floor").value = meta.floor;
    if (meta.activeRoom) activeRoom = Number(meta.activeRoom) || 1;
    if (meta.roomCount) roomCount = Number(meta.roomCount) || roomCount;
    if (meta.reportRoomMeta) reportRoomMeta = meta.reportRoomMeta;
  } catch (e) {
    console.error("Ошибка чтения метаданных фотоотчёта", e);
  }
}

function savePhotoReportMeta() {
  const meta = {
    reportDate: document.getElementById("reportDate").value,
    city: document.getElementById("city").value,
    office: document.getElementById("office").value,
    floor: document.getElementById("floor").value,
    activeRoom: activeRoom,
    roomCount: roomCount,
    reportRoomMeta: reportRoomMeta
  };

  localStorage.setItem(PHOTO_META_KEY, JSON.stringify(meta));
}

function getChecklistIssuesForRoom(roomNumber) {
  const room = roomName(roomNumber);
  const result = [];

  Object.keys(checklistIssues).forEach(function(key) {
    const issue = checklistIssues[key];

    if (!issue) return;

    if (issue.room === room || issue.room === "Переговорная " + roomNumber) {
      const text = issue.issue || issue.item || "";
      if (text) result.push(text);
    }
  });

  return result;
}

function getRoomReportMeta(roomNumber) {
  if (!reportRoomMeta[roomNumber]) {
    const issues = getChecklistIssuesForRoom(roomNumber);

    reportRoomMeta[roomNumber] = {
      roomNumber: roomName(roomNumber),
      roomTitle: "Переговорная",
      issuesText: issues.join("\n")
    };
  }

  return reportRoomMeta[roomNumber];
}

function updateRoomReportField(roomNumber, field, value) {
  const meta = getRoomReportMeta(roomNumber);
  meta[field] = value;
  savePhotoReportMeta();
}

function formatIssuesForPrint(text) {
  if (!text || !text.trim()) {
    return "<div>Замечания отсутствуют.</div>";
  }

  const lines = text
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean);

  if (!lines.length) {
    return "<div>Замечания отсутствуют.</div>";
  }

  let html = "<ol>";

  lines.forEach(function(line) {
    html += "<li>" + escapeHtml(line) + "</li>";
  });

  html += "</ol>";

  return html;
}

function openPhotoDb() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(PHOTO_DB_NAME, 1);

    request.onupgradeneeded = function(event) {
      const database = event.target.result;

      if (!database.objectStoreNames.contains(PHOTO_STORE_NAME)) {
        const store = database.createObjectStore(PHOTO_STORE_NAME, {
          keyPath: "id"
        });

        store.createIndex("roomNumber", "roomNumber", {
          unique: false
        });

        store.createIndex("createdAt", "createdAt", {
          unique: false
        });
      }
    };

    request.onsuccess = function(event) {
      db = event.target.result;
      resolve(db);
    };

    request.onerror = function(event) {
      console.error("Ошибка IndexedDB", event);
      reject(event);
    };
  });
}

function savePhotoRecord(record) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction([PHOTO_STORE_NAME], "readwrite");
    const store = transaction.objectStore(PHOTO_STORE_NAME);
    const request = store.put(record);

    request.onsuccess = function() {
      resolve(record);
    };

    request.onerror = function(event) {
      reject(event);
    };
  });
}

function getPhotosByRoom(roomNumber) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction([PHOTO_STORE_NAME], "readonly");
    const store = transaction.objectStore(PHOTO_STORE_NAME);
    const index = store.index("roomNumber");
    const request = index.getAll(roomNumber);

    request.onsuccess = function(event) {
      const photos = event.target.result || [];
      photos.sort((a, b) => (a.order || 0) - (b.order || 0));
      resolve(photos);
    };

    request.onerror = function(event) {
      reject(event);
    };
  });
}

function deletePhotoRecord(photoId) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction([PHOTO_STORE_NAME], "readwrite");
    const store = transaction.objectStore(PHOTO_STORE_NAME);
    const request = store.delete(photoId);

    request.onsuccess = function() {
      resolve();
    };

    request.onerror = function(event) {
      reject(event);
    };
  });
}

function clearPhotosByRoom(roomNumber) {
  return getPhotosByRoom(roomNumber).then(function(photos) {
    const promises = photos.map(photo => deletePhotoRecord(photo.id));
    return Promise.all(promises);
  });
}
function renderRoomSelect() {
  const select = document.getElementById("roomSelect");
  select.innerHTML = "";

  for (let i = 1; i <= roomCount; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = roomName(i);
    select.appendChild(option);
  }

  if (activeRoom > roomCount) activeRoom = roomCount;
  if (activeRoom < 1) activeRoom = 1;

  select.value = activeRoom;
}

function changeRoom() {
  const select = document.getElementById("roomSelect");
  activeRoom = Number(select.value) || 1;
  savePhotoReportMeta();
  renderReport();
}

function applyRoomCount() {
  const input = document.getElementById("roomCountInput");
  let value = Number(input.value);

  if (!value || value < 1) value = 1;
  if (value > 50) value = 50;

  roomCount = value;
  input.value = roomCount;

  if (activeRoom > roomCount) activeRoom = roomCount;

  renderRoomSelect();
  savePhotoReportMeta();
  renderReport();
}

function getReportHeaderHtml(roomNumber, pageNumber, totalPages) {
  const city = escapeHtml(document.getElementById("city").value || "");
  const office = escapeHtml(document.getElementById("office").value || "");
  const floor = escapeHtml(document.getElementById("floor").value || "");
  const date = escapeHtml(document.getElementById("reportDate").value || todayISO());
  const meta = getRoomReportMeta(roomNumber);

  return `
    <div class="report-header">
      <div>
        <div class="report-title">Фотоотчёт по переговорной</div>
        <div>${office}${city ? " / " + city : ""}</div>
      </div>
      <div class="report-meta">
        <div>${date}</div>
        <div>${floor ? "Этаж: " + floor : ""}</div>
        <div>Стр. ${pageNumber} из ${totalPages}</div>
      </div>
    </div>

    <div class="room-info">
      <div>№ помещения</div>
      <div>
        <input
          class="report-inline-input screen-only"
          value="${escapeHtml(meta.roomNumber)}"
          onchange="updateRoomReportField(${roomNumber}, 'roomNumber', this.value)"
        >
        <span class="print-only">${escapeHtml(meta.roomNumber)}</span>
      </div>

      <div>Наименование помещения</div>
      <div>
        <input
          class="report-inline-input screen-only"
          value="${escapeHtml(meta.roomTitle)}"
          onchange="updateRoomReportField(${roomNumber}, 'roomTitle', this.value)"
        >
        <span class="print-only">${escapeHtml(meta.roomTitle)}</span>
      </div>
    </div>
  `;
}

function renderIssuesBlock(roomNumber) {
  const meta = getRoomReportMeta(roomNumber);
  const text = meta.issuesText || "";

  return `
    <div class="issues-block">
      <div class="issues-title">Список замечаний</div>

      <div class="issues-list screen-only">
        <textarea
          class="issues-edit-textarea"
          onchange="updateRoomReportField(${roomNumber}, 'issuesText', this.value)"
        >${escapeHtml(text)}</textarea>
      </div>

      <div class="issues-list print-only">
        ${formatIssuesForPrint(text)}
      </div>
    </div>
  `;
}

function renderReport() {
  savePhotoReportMeta();

  const container = document.getElementById("reportContainer");
  container.innerHTML = "";

  getPhotosByRoom(activeRoom).then(function(photos) {
    const page = document.createElement("div");
    page.className = "report-page";

    page.innerHTML =
      getReportHeaderHtml(activeRoom, 1, 1) +
      renderIssuesBlock(activeRoom) +
      `<div class="photo-section-title">Фото</div>`;

    const grid = document.createElement("div");
    grid.className = "photo-grid";
    grid.id = "photoGrid";

    photos.forEach(function(photo) {
      grid.appendChild(createPhotoCard(photo));
    });

    page.appendChild(grid);
    container.appendChild(page);
  });
}

function goToChecklist() {
  savePhotoReportMeta();
  window.location.href = "index.html";
}

["reportDate", "city", "office", "floor"].forEach(function(id) {
  document.addEventListener("input", function(event) {
    if (event.target && event.target.id === id) {
      savePhotoReportMeta();
      renderReport();
    }
  });
});
function openCamera() {
  const input = document.getElementById("cameraInput");
  input.value = "";
  input.click();
}

function openGallery() {
  const input = document.getElementById("galleryInput");
  input.value = "";
  input.click();
}

function handlePhotoCapture(event) {
  const files = event.target.files;

  if (!files || !files.length) return;

  const file = files[0];

  compressImage(file, 1600, 0.82).then(function(blob) {
    return getPhotosByRoom(activeRoom).then(function(existingPhotos) {
      const width = Number(document.getElementById("defaultPhotoWidth").value) || 50;

      const record = {
        id: "photo_" + Date.now(),
        roomNumber: activeRoom,
        roomName: roomName(activeRoom),
        blob: blob,
        caption: "",
        note: "",
        width: width,
        order: existingPhotos.length + 1,
        createdAt: new Date().toISOString()
      };

      return savePhotoRecord(record);
    });
  }).then(function() {
    event.target.value = "";
    renderReport();
  }).catch(function(error) {
    console.error(error);
    alert("Не удалось добавить фото.");
  });
}

function compressImage(file, maxWidth, quality) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();

    reader.onload = function(event) {
      const img = new Image();

      img.onload = function() {
        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob(function(blob) {
          if (blob) {
            resolve(blob);
          } else {
            reject(new Error("Ошибка сжатия изображения"));
          }
        }, "image/jpeg", quality);
      };

      img.onerror = function() {
        reject(new Error("Ошибка чтения изображения"));
      };

      img.src = event.target.result;
    };

    reader.onerror = function() {
      reject(new Error("Ошибка FileReader"));
    };

    reader.readAsDataURL(file);
  });
}

function blobToObjectUrl(blob) {
  return URL.createObjectURL(blob);
}

function createPhotoCard(photo) {
  const card = document.createElement("div");
  card.className = "photo-card";
  card.style.width = photo.width + "%";
  card.dataset.photoId = photo.id;

  const inner = document.createElement("div");
  inner.className = "photo-inner";

  const img = document.createElement("img");
  img.src = blobToObjectUrl(photo.blob);

  inner.appendChild(img);

  let overlay = null;

  if (photo.note) {
    overlay = document.createElement("div");
    overlay.className = "photo-note-overlay";
    overlay.textContent = photo.note;
    inner.appendChild(overlay);
  }

  card.appendChild(inner);

  const caption = document.createElement("textarea");
  caption.className = "photo-caption";
  caption.placeholder = "Подпись под фото";
  caption.value = photo.caption || "";
  caption.addEventListener("input", function() {
    photo.caption = caption.value;
    savePhotoRecord(photo);
  });

  card.appendChild(caption);

  const noteInput = document.createElement("textarea");
  noteInput.className = "photo-note-input screen-only";
  noteInput.placeholder = "Пометка поверх фото";
  noteInput.value = photo.note || "";

  noteInput.addEventListener("input", function() {
    photo.note = noteInput.value;

    if (!overlay && photo.note.trim()) {
      overlay = document.createElement("div");
      overlay.className = "photo-note-overlay";
      inner.appendChild(overlay);
    }

    if (overlay) {
      overlay.textContent = photo.note;

      if (!photo.note.trim()) {
        overlay.remove();
        overlay = null;
      }
    }

    savePhotoRecord(photo);
  });

  card.appendChild(noteInput);

  const controls = document.createElement("div");
  controls.className = "photo-controls screen-only";

  const sizeSelect = document.createElement("select");
  sizeSelect.innerHTML = `
    <option value="100">1 в ряд</option>
    <option value="50">2 в ряд</option>
    <option value="33.333">3 в ряд</option>
  `;
  sizeSelect.value = String(photo.width || 50);
  sizeSelect.addEventListener("change", function() {
    photo.width = Number(sizeSelect.value);
    savePhotoRecord(photo).then(renderReport);
  });

  const upBtn = document.createElement("button");
  upBtn.className = "small secondary";
  upBtn.textContent = "↑";
  upBtn.onclick = function() {
    movePhoto(photo.id, -1);
  };

  const downBtn = document.createElement("button");
  downBtn.className = "small secondary";
  downBtn.textContent = "↓";
  downBtn.onclick = function() {
    movePhoto(photo.id, 1);
  };

  const deleteBtn = document.createElement("button");
  deleteBtn.className = "small danger";
  deleteBtn.textContent = "Удалить";
  deleteBtn.onclick = function() {
    if (confirm("Удалить фото?")) {
      deletePhotoRecord(photo.id).then(renderReport);
    }
  };

  controls.appendChild(sizeSelect);
  controls.appendChild(upBtn);
  controls.appendChild(downBtn);
  controls.appendChild(deleteBtn);

  card.appendChild(controls);

  return card;
}
function movePhoto(photoId, direction) {
  getPhotosByRoom(activeRoom).then(function(photos) {
    const index = photos.findIndex(photo => photo.id === photoId);

    if (index === -1) return;

    const newIndex = index + direction;

    if (newIndex < 0 || newIndex >= photos.length) return;

    const current = photos[index];
    const target = photos[newIndex];

    const tempOrder = current.order;
    current.order = target.order;
    target.order = tempOrder;

    return Promise.all([
      savePhotoRecord(current),
      savePhotoRecord(target)
    ]);
  }).then(function() {
    renderReport();
  });
}

function clearRoomPhotos() {
  if (!confirm("Удалить все фото выбранного помещения?")) return;

  clearPhotosByRoom(activeRoom).then(function() {
    renderReport();
  });
}

function getAllPhotos() {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction([PHOTO_STORE_NAME], "readonly");
    const store = transaction.objectStore(PHOTO_STORE_NAME);
    const request = store.getAll();

    request.onsuccess = function(event) {
      resolve(event.target.result || []);
    };

    request.onerror = function(event) {
      reject(event);
    };
  });
}

function blobToBase64(blob) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();

    reader.onloadend = function() {
      resolve(reader.result);
    };

    reader.onerror = function(error) {
      reject(error);
    };

    reader.readAsDataURL(blob);
  });
}

function base64ToBlob(base64) {
  const parts = base64.split(",");
  const mimeMatch = parts[0].match(/:(.*?);/);
  const mime = mimeMatch ? mimeMatch[1] : "image/jpeg";
  const binary = atob(parts[1]);
  const length = binary.length;
  const array = new Uint8Array(length);

  for (let i = 0; i < length; i++) {
    array[i] = binary.charCodeAt(i);
  }

  return new Blob([array], {
    type: mime
  });
}

function exportPhotoReport() {
  getAllPhotos().then(function(photos) {
    return Promise.all(photos.map(function(photo) {
      return blobToBase64(photo.blob).then(function(base64) {
        return {
          id: photo.id,
          roomNumber: photo.roomNumber,
          roomName: photo.roomName,
          image: base64,
          caption: photo.caption,
          note: photo.note,
          width: photo.width,
          order: photo.order,
          createdAt: photo.createdAt
        };
      });
    }));
  }).then(function(photoData) {
    const exportData = {
      meta: {
        reportDate: document.getElementById("reportDate").value,
        city: document.getElementById("city").value,
        office: document.getElementById("office").value,
        floor: document.getElementById("floor").value,
        roomCount: roomCount,
        activeRoom: activeRoom,
        reportRoomMeta: reportRoomMeta
      },
      roomNames: roomNames,
      photos: photoData
    };

    const blob = new Blob([JSON.stringify(exportData, null, 2)], {
      type: "application/json"
    });

    const office = document.getElementById("office").value || "office";
    const floor = document.getElementById("floor").value || "floor";
    const date = document.getElementById("reportDate").value || todayISO();

    const filename = ("Photo_Report_" + office + "_" + floor + "_" + date + ".json")
      .replace(/\s+/g, "_")
      .replace(/[\\/:*?"<>|]/g, "_");

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();

    URL.revokeObjectURL(a.href);
  });
}

function importPhotoReport(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      if (data.meta) {
        document.getElementById("reportDate").value = data.meta.reportDate || todayISO();
        document.getElementById("city").value = data.meta.city || "";
        document.getElementById("office").value = data.meta.office || "";
        document.getElementById("floor").value = data.meta.floor || "";
        roomCount = Number(data.meta.roomCount) || roomCount;
        activeRoom = Number(data.meta.activeRoom) || activeRoom;

        if (data.meta.reportRoomMeta) {
          reportRoomMeta = data.meta.reportRoomMeta;
        }
      }

      if (data.roomNames) {
        roomNames = data.roomNames;
      }

      const photos = data.photos || [];

      Promise.all(photos.map(function(photo) {
        const record = {
          id: photo.id,
          roomNumber: photo.roomNumber,
          roomName: photo.roomName,
          blob: base64ToBlob(photo.image),
          caption: photo.caption || "",
          note: photo.note || "",
          width: Number(photo.width) || 50,
          order: Number(photo.order) || 1,
          createdAt: photo.createdAt || new Date().toISOString()
        };

        return savePhotoRecord(record);
      })).then(function() {
        document.getElementById("roomCountInput").value = roomCount;
        renderRoomSelect();
        renderReport();
        savePhotoReportMeta();
        alert("Фотоотчёт импортирован.");
      });

    } catch (err) {
      console.error(err);
      alert("Ошибка импорта фотоотчёта.");
    }
  };

  reader.readAsText(file);
  event.target.value = "";
}

function printPhotoReport() {
  window.print();
}
function addExportImportControls() {
  const controlPanel = document.querySelector(".room-panel");

  if (!controlPanel) return;

  const extra = document.createElement("div");
  extra.className = "screen-only";
  extra.style.display = "flex";
  extra.style.gap = "8px";
  extra.style.flexWrap = "wrap";
  extra.style.marginTop = "8px";

  const exportBtn = document.createElement("button");
  exportBtn.className = "secondary";
  exportBtn.textContent = "Экспорт фотоотчёта";
  exportBtn.onclick = exportPhotoReport;

  const importInput = document.createElement("input");
  importInput.type = "file";
  importInput.accept = ".json";
  importInput.className = "hidden";
  importInput.id = "photoReportImportInput";
  importInput.onchange = importPhotoReport;

  const importBtn = document.createElement("button");
  importBtn.className = "secondary";
  importBtn.textContent = "Импорт фотоотчёта";
  importBtn.onclick = function() {
    importInput.click();
  };

  const printBtn = document.createElement("button");
  printBtn.className = "secondary";
  printBtn.textContent = "Печать A4";
  printBtn.onclick = printPhotoReport;

  extra.appendChild(exportBtn);
  extra.appendChild(importInput);
  extra.appendChild(importBtn);
  extra.appendChild(printBtn);

  controlPanel.appendChild(extra);
}

function attachMetaListeners() {
  ["reportDate", "city", "office", "floor"].forEach(function(id) {
    const el = document.getElementById(id);
    if (!el) return;

    el.addEventListener("input", function() {
      savePhotoReportMeta();
      renderReport();
    });
  });
}

function initPhotoReport() {
  document.getElementById("reportDate").value = todayISO();

  loadChecklistData();
  loadPhotoReportMeta();

  document.getElementById("roomCountInput").value = roomCount;

  openPhotoDb().then(function() {
    renderRoomSelect();
    renderReport();
    attachMetaListeners();
    addExportImportControls();
  }).catch(function(error) {
    console.error(error);
    alert("Не удалось открыть локальное хранилище фото. Проверьте настройки браузера.");
  });
}

initPhotoReport();
</script>
