<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Document -->
  <rect x="120" y="82" width="272" height="348" rx="28" fill="url(#paper)" filter="url(#shadow)"/>

  <!-- Fold corner -->
  <path d="M330 82 L392 144 L354 150 C341 152 330 141 331 128 Z" fill="#CBD5E1"/>
  <path d="M330 82 L392 144 L350 144 C339 144 330 135 330 124 Z" fill="#F8FAFC"/>

  <!-- AV screen -->
  <rect x="158" y="138" width="196" height="112" rx="16" fill="#111827"/>
  <rect x="176" y="156" width="160" height="76" rx="8" fill="#38BDF8"/>

  <!-- Camera dot -->
  <circle cx="256" cy="145" r="5" fill="#E5E7EB"/>

  <!-- Screen stand -->
  <rect x="242" y="250" width="28" height="22" rx="4" fill="#111827"/>
  <rect x="214" y="272" width="84" height="12" rx="6" fill="#111827"/>

  <!-- Checklist lines -->
  <rect x="190" y="308" width="150" height="14" rx="7" fill="#94A3B8"/>
  <rect x="190" y="346" width="126" height="14" rx="7" fill="#94A3B8"/>
  <rect x="190" y="384" width="104" height="14" rx="7" fill="#94A3B8"/>

  <!-- Check icons -->
  <circle cx="164" cy="315" r="11" fill="#22C55E"/>
  <path d="M158 314 L163 319 L171 309" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="164" cy="353" r="11" fill="#F97316"/>
  <path d="M158 352 L163 357 L171 347" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="164" cy="391" r="11" fill="#EF4444"/>
  <path d="M158 390 L163 395 L171 385" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AV label -->
  <rect x="198" y="174" width="116" height="40" rx="12" fill="#FFFFFF" opacity="0.92"/>
  <text x="256" y="202" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1F2937">AV</text>
</svg>
